# scitex-dev project-type config
# vendor/ holds two pre-pip-install vendored projects (dois2sqlite,
# labs-data-file-api) used as build-time references. Not imported by
# src/, not shipped in the wheel.

project-type:
  - pip

audit:
  root-whitelist:
    dirs:
      - vendor
      # CI-side install artefacts that `pip install -e ".[all]"`
      # creates on the GitHub Actions runner and not in the wheel.
      # They are .gitignored but the auditor walks the filesystem.
      - lib
      - lib64
    files:
      - codecov.yml
